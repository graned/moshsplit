# Diesel configuration for pitboss-api
# ====================================
# Diesel is the primary database driver (via r2d2 connection pool).
# The CLI is also used for schema introspection.

[print_schema]
# Where to write the generated schema
file = "src/schema.rs"

# The PostgreSQL schema to introspect (not "public")
schema = "app"

# Patch file applied on top of the raw Diesel output to preserve
# manual customisations across re-generations
patch_file = "src/schema.patch"

[migrations_directory]
# Directory containing Diesel migration SQL files (used only for
# the diesel_cli tooling; runtime migrations are handled by SQLx)
dir = "migrations/"
