# MoshSplit — Development Docker Compose
# ======================================
# Uses hot-reload for pitboss-api (cargo-watch) and web (Vite HMR).
# Source directories are mounted as bind volumes so edits take effect immediately.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: moshsplit-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moshsplit
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── pitboss-api migrations (run as postgres superuser) ──────────────────────
  pitboss-api-migrations:
    build:
      context: ../../
      dockerfile: infra/docker/pitboss-api.Dockerfile
      target: dev
    container_name: pitboss-api-migrations
    volumes:
      - ../../apps/pitboss-api:/app/apps/pitboss-api
      - ../../packages:/app/packages
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/moshsplit
      RUST_LOG: info
    command: ["cargo", "run", "--manifest-path", "/app/apps/pitboss-api/Cargo.toml", "--", "--migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  # ── pitboss-api (Rust / Axum) ──────────────────────────────────────────────
  pitboss-api:
    build:
      context: ../../
      dockerfile: infra/docker/pitboss-api.Dockerfile
      target: dev
    container_name: pitboss-api
    ports:
      - "8080:8080"
    volumes:
      - ../../apps/pitboss-api:/app/apps/pitboss-api
      - ../../packages:/app/packages
    environment:
      DATABASE_URL: postgres://pitboss:password@postgres:5432/moshsplit
      PGOPTIONS: "-c search_path=app"
      RUST_LOG: debug
      SENTINEL_URL: http://sentinel:8000
    command: ["cargo", "run", "--manifest-path", "/app/apps/pitboss-api/Cargo.toml"]
    depends_on:
      pitboss-api-migrations:
        condition: service_completed_successfully
      sentinel:
        condition: service_started
    networks:
      - app-net

  # ── Sentinel migrations ─────────────────────────────────────────────────────
  sentinel-migrations:
    build:
      context: ../../
      dockerfile: infra/docker/sentinel-migrate.Dockerfile
    container_name: sentinel-migrations
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/sentinel_auth
      PGOPTIONS: "-c search_path=auth"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  # ── Sentinel (auth service) ─────────────────────────────────────────────────
  sentinel:
    image: ghcr.io/graned/sentinel-core:v1.1.0
    container_name: moshsplit-sentinel
    ports:
      - "9000:8000"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/sentinel_auth
      PGOPTIONS: "-c search_path=auth"
      HEX_KEY: 32a8c0fc962ce0299e8f5dedb1ff75b7e8789416db8f6836fb91c6e7bd2e58fe
      CONFIG_ENCRYPTION_KEY: 02b96ece27c893f176d52139c17ef97db53283a3b0a75e185c2a9da7c1855db5
      RUST_LOG: debug
      OIDC_ISSUER_URL: http://localhost:9000
      FRONTEND_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    depends_on:
      sentinel-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/v1/api/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Sentinel UI (management dashboard) ──────────────────────────────────────
  # Note: VITE_API_URL is baked into the JS bundle at build time.
  # The pre-built image expects sentinel-core at http://localhost:9000.
  # For custom URLs, build your own image with --build-arg VITE_API_URL=<your-url>
  sentinel-ui:
    image: ghcr.io/graned/sentinel-ui:v1.1.0
    container_name: moshsplit-sentinel-ui
    ports:
      - "3000:80"
    volumes:
      - ../../infra/docker/sentinel-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      sentinel:
        condition: service_healthy
    networks:
      - app-net

  # ── Web (React PWA / Vite) ─────────────────────────────────────────────────
  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    container_name: moshsplit-web
    ports:
      - "5173:5173"
    volumes:
      # Mount the full web app directory for Vite HMR.
      - ../../apps/web:/app/apps/web
      # Mount sentinel-sdk for HMR
      - ../../packages/sentinel-sdk:/app/packages/sentinel-sdk
    environment:
      # Use localhost for browser access - Vite proxies /api to pitboss-api
      VITE_API_BASE_URL: http://localhost:8080
      # Also use localhost for Sentinel (port 9000 exposed)
      VITE_SENTINEL_URL: http://localhost:9000
    depends_on:
      pitboss-api:
        condition: service_started
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge