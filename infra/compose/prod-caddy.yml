# MoshSplit — Production Docker Compose with Caddy Reverse Proxy
# ===============================================================
# This compose file uses pre-built images from GitHub Container Registry
# with Caddy as the front-facing reverse proxy for automatic HTTPS.
#
# Usage:
#   1. Create .env file with required variables (see .env.example)
#   2. Set MOSHSPLIT_URL=moshsplit.example.com in .env
#   3. docker compose -f infra/compose/prod-caddy.yml up -d
#
# Access:
#   - Web Frontend: https://moshsplit.example.com/moshsplit/
#   - Pitboss API:  https://moshsplit.example.com/pitboss/
#   - Sentinel UI:  https://moshsplit.example.com/auth/
#   - Sentinel API: https://moshsplit.example.com/sentinel/
#
# Images:
#   - ghcr.io/graned/moshsplit/pitboss-api:<tag>
#   - ghcr.io/graned/moshsplit/web:<tag>
#   - Sentinel uses official image: ghcr.io/graned/sentinel-core:v1.1.0

services:

  # ── Caddy Reverse Proxy (Front-facing) ─────────────────────────────────────
  # Only service exposed to the outside world (ports 80/443)
  # Handles automatic HTTPS, SSL termination, and path-based routing
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      MOSHSPLIT_URL: ${MOSHSPLIT_URL:?MOSHSPLIT_URL is required}
    depends_on:
      pitboss-api:
        condition: service_healthy
      sentinel:
        condition: service_healthy
      sentinel-ui:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - proxy-net
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── pitboss-api migrations (run as postgres superuser) ──────────────────────
  # Runs Diesel migrations before pitboss-api starts
  pitboss-api-migrations:
    image: ghcr.io/graned/moshsplit/pitboss-api:${MOSHSPLIT_VERSION:-latest}
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/moshsplit
      RUST_LOG: info
    command: ["./pitboss-api", "--migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: "no"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    # No ports exposed - only accessible via internal network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-moshsplit}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── pitboss-api (Rust / Axum) ──────────────────────────────────────────────
  pitboss-api:
    image: ghcr.io/graned/moshsplit/pitboss-api:${MOSHSPLIT_VERSION:-latest}
    # No ports exposed - accessed via Caddy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PGOPTIONS: "-c search_path=app"
      RUST_LOG: ${RUST_LOG:-info}
      SENTINEL_URL: http://sentinel:8000
      SENTINEL_PUBLIC_KEY: ${SENTINEL_PUBLIC_KEY}
      # CORS: Allow requests from Caddy (same origin after proxy)
      CORS_ALLOWED_ORIGINS: https://${MOSHSPLIT_URL},http://localhost:80,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      pitboss-api-migrations:
        condition: service_completed_successfully
      sentinel:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Sentinel (auth service) ───────────────────────────────────────────────
  sentinel:
    image: ghcr.io/graned/sentinel-core:v1.2.0
    # No ports exposed - accessed via Caddy
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:?AUTH_DATABASE_URL is required}
      PGOPTIONS: "-c search_path=auth"
      HEX_KEY: ${HEX_KEY:?HEX_KEY is required}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY is required}
      RUST_LOG: ${RUST_LOG:-info}
      # OIDC issuer URL now uses the public URL
      OIDC_ISSUER_URL: https://${MOSHSPLIT_URL}/sentinel
      # Frontend URL for redirects
      FRONTEND_URL: https://${MOSHSPLIT_URL}/moshsplit
      CORS_ALLOWED_ORIGINS: https://${MOSHSPLIT_URL},http://localhost:80,http://localhost:5173
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/v1/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Sentinel UI (management dashboard) ─────────────────────────────────────
  sentinel-ui:
    image: ghcr.io/graned/sentinel-ui:v1.2.0
    # No ports exposed - accessed via Caddy
    volumes:
      - ./sentinel-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      # Internal API URL for proxying
      API_URL: http://sentinel:8000
    depends_on:
      sentinel:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Web (React PWA) ─────────────────────────────────────────────────────────
  web:
    image: ghcr.io/graned/moshsplit/web:${MOSHSPLIT_VERSION:-latest}
    # No ports exposed - accessed via Caddy
    volumes:
      # Runtime config - override build-time env vars
      - ./config.js:/usr/share/nginx/html/config.js:ro
    environment:
      # Build-time variables (baked into image)
      # For runtime configuration, consider runtime env injection
      VITE_API_BASE_URL: /pitboss
      VITE_SENTINEL_URL: /sentinel
    depends_on:
      pitboss-api:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  # Proxy network - Caddy only
  proxy-net:
    driver: bridge
  # App network - internal services only
  app-net:
    driver: bridge
    internal: false  # Caddy needs to reach these
