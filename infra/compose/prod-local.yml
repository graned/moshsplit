# MoshSplit — Production Docker Compose with Local Build
# ===============================================================
# Builds images locally instead of pulling from GHCR.
# Use this for testing before pushing to GHCR.
#
# Usage:
#   1. Create .env file with required variables
#   2. docker compose -f infra/compose/prod-local.yml up -d

services:

  # ── Caddy Reverse Proxy (Front-facing) ─────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      MOSHSPLIT_URL: ${MOSHSPLIT_URL:?MOSHSPLIT_URL is required}
    depends_on:
      - pitboss-api
      - sentinel
      - sentinel-ui
      - web
    networks:
      - proxy-net
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── pitboss-api migrations ──────────────────────────────────────────────────
  pitboss-api-migrations:
    build:
      context: ../../
      dockerfile: infra/docker/pitboss-api.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/moshsplit
      RUST_LOG: info
    command: ["./pitboss-api", "--migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: "no"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-moshsplit}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── pitboss-api (Rust / Axum) ──────────────────────────────────────────────
  pitboss-api:
    build:
      context: ../../
      dockerfile: infra/docker/pitboss-api.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PGOPTIONS: "-c search_path=app"
      RUST_LOG: ${RUST_LOG:-info}
      SENTINEL_URL: http://sentinel:8000
      SENTINEL_PUBLIC_KEY: ${SENTINEL_PUBLIC_KEY}
      CORS_ALLOWED_ORIGINS: https://${MOSHSPLIT_URL},http://localhost:80,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      pitboss-api-migrations:
        condition: service_completed_successfully
      sentinel:
        condition: service_started
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Sentinel (auth service) ───────────────────────────────────────────────
  sentinel:
    image: ghcr.io/graned/sentinel-core:v1.2.0
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:?AUTH_DATABASE_URL is required}
      PGOPTIONS: "-c search_path=auth"
      HEX_KEY: ${HEX_KEY:?HEX_KEY is required}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY is required}
      RUST_LOG: ${RUST_LOG:-info}
      OIDC_ISSUER_URL: https://${MOSHSPLIT_URL}/sentinel
      FRONTEND_URL: https://${MOSHSPLIT_URL}/moshsplit
      CORS_ALLOWED_ORIGINS: https://${MOSHSPLIT_URL},http://localhost:80,http://localhost:5173
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/v1/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Sentinel UI ─────────────────────────────────────────────────────────────
  sentinel-ui:
    image: ghcr.io/graned/sentinel-ui:v1.2.0
    volumes:
      - ../docker/sentinel-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      API_URL: http://sentinel:8000
    depends_on:
      sentinel:
        condition: service_started
    networks:
      - app-net
    restart: unless-stopped

  # ── Web (React PWA) ─────────────────────────────────────────────────────────
  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: /pitboss
      VITE_SENTINEL_URL: /sentinel
    depends_on:
      - pitboss-api
    networks:
      - proxy-net
      - app-net
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  proxy-net:
    driver: bridge
  app-net:
    driver: bridge
