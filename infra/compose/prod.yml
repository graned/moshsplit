# MoshSplit — Production Docker Compose
# ======================================
# Optimised for deployment.  No bind-mounts, health checks, restart policies,
# and env-var substitution from a .env file.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-moshsplit}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pitboss-api (Rust / Axum) ──────────────────────────────────────────────
  pitboss-api:
    build:
      context: ../../
      dockerfile: infra/docker/pitboss-api.Dockerfile
      target: prod
    ports:
      - "${PITBOSS_API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PGOPTIONS: "-c search_path=app"
      RUST_LOG: ${RUST_LOG:-info}
      SENTINEL_URL: http://sentinel:8000
      SENTINEL_PUBLIC_KEY: ${SENTINEL_PUBLIC_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      sentinel:
        condition: service_started
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Sentinel migrations (runs before Sentinel, creates tables in 'auth' schema) ─
  sentinel-migrations:
    build:
      context: ../../
      dockerfile: infra/docker/sentinel-migrate.Dockerfile
    environment:
      # Use shared moshsplit database - the DATABASE_URL should point to the same
      # database as pitboss-api but without the schema prefix (diesel handles schema via diesel.toml)
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: "no"

  # ── Sentinel (auth service) ───────────────────────────────────────────────
  sentinel:
    image: ghcr.io/graned/sentinel-core:v1.1.0
    ports:
      - "${SENTINEL_PORT:-9000}:8000"
    environment:
      # Use shared moshsplit database - Sentinel uses 'auth' schema via PGOPTIONS
      DATABASE_URL: ${DATABASE_URL}
      PGOPTIONS: "-c search_path=auth"
      HEX_KEY: ${HEX_KEY}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      RUST_LOG: ${RUST_LOG:-info}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    depends_on:
      sentinel-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/v1/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Sentinel UI (management dashboard) ─────────────────────────────────────
  # Note: VITE_API_URL is baked into the JS bundle at build time.
  # For production, you may need to build a custom image with the correct API URL:
  #   docker build -f apps/sentinel-ui/Dockerfile --build-arg VITE_API_URL=${SENTINEL_URL} .
  sentinel-ui:
    image: ghcr.io/graned/sentinel-ui:v1.1.0
    ports:
      - "${SENTINEL_UI_PORT:-3000}:80"
    volumes:
      - ../../infra/docker/sentinel-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      API_URL: ${SENTINEL_URL:-http://localhost:9000}
    depends_on:
      sentinel:
        condition: service_started
    networks:
      - app-net
    restart: unless-stopped

  # ── Web (React PWA) ─────────────────────────────────────────────────────────
  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
      target: prod
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      VITE_SENTINEL_URL: ${VITE_SENTINEL_URL:-http://localhost:9000}
    depends_on:
      - pitboss-api
    networks:
      - app-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge