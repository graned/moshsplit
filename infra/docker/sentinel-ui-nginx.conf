server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to sentinel-core
    location /v1/ {
        proxy_pass http://sentinel:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all unmatched paths serve index.html so the React router
    # handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache hashed static assets (JS, CSS bundles).
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short-lived cache for images and SVGs.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Never cache the entry point.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml;
    gzip_min_length 1024;

    server_tokens off;
}